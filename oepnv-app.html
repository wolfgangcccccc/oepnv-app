<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Transit — Deine Route</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#050505;
    --card:rgba(255,255,255,0.055);
    --card-border:rgba(255,255,255,0.10);
    --text:#f7f7f6;
    --text-dim:#a6a19b;
    --text-dim2:#615c56;
    --black:#000000;
    --red:#EE1C25;
    --gold:#FFD100;
    --accent:#EE1C25;
    --accent2:#FFD100;
    --accent-grad:linear-gradient(115deg,#000000 0%, #EE1C25 52%, #FFD100 100%);
    --accent-grad2:linear-gradient(115deg,#FFD100 0%, #EE1C25 100%);
    --radius:22px;
    --radius-sm:14px;

    /* Linien-Farben (echte ÖPNV-Kategorien) */
    --line-ice:#FFFFFF;
    --line-ic:#EE1C25;
    --line-re:#70706c;
    --line-rb:#a8a49d;
    --line-sbahn:#00A651;
    --line-ubahn:#0067B1;
    --line-tram:#FFD100;
    --line-bus:#8B3DFF;
    --line-ferry:#0067B1;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    background:
      radial-gradient(circle at 12% -8%, rgba(238,28,37,0.22), transparent 42%),
      radial-gradient(circle at 92% 6%, rgba(255,209,0,0.14), transparent 40%),
      radial-gradient(circle at 50% 105%, rgba(238,28,37,0.12), transparent 55%),
      var(--bg);
    color:var(--text);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    min-height:100vh;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- SPLASH: DEUTSCHLAND-FLAGGE ---------- */
  #splash{
    position:fixed;inset:0;z-index:9999;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:#000;
    transition:opacity .6s ease, visibility .6s ease;
    overflow:hidden;
  }
  #splash.hide{opacity:0;visibility:hidden;pointer-events:none;}

  .flag-stripes{
    position:absolute;inset:0;display:flex;flex-direction:column;
  }
  .flag-stripes .stripe{
    flex:1;width:100%;
    transform:translateY(100%);
    animation:stripeIn .8s cubic-bezier(.16,.9,.25,1) forwards;
  }
  .flag-stripes .stripe.s1{background:#000000;animation-delay:.05s;}
  .flag-stripes .stripe.s2{background:#EE1C25;animation-delay:.18s;}
  .flag-stripes .stripe.s3{background:#FFD100;animation-delay:.31s;}
  @keyframes stripeIn{
    to{transform:translateY(0);}
  }
  #splash.hide .flag-stripes .stripe{
    transition:transform .6s cubic-bezier(.6,0,.85,0);
  }
  #splash.hide .flag-stripes .stripe.s1{transition-delay:.05s;transform:translateY(-100%);}
  #splash.hide .flag-stripes .stripe.s2{transition-delay:.1s;transform:translateY(-100%);}
  #splash.hide .flag-stripes .stripe.s3{transition-delay:.15s;transform:translateY(-100%);}

  .splash-content{
    position:relative;z-index:2;
    display:flex;flex-direction:column;align-items:center;
  }
  .splash-logo{
    width:88px;height:88px;border-radius:26px;
    background:rgba(0,0,0,0.35);
    border:2.5px solid rgba(255,255,255,0.85);
    backdrop-filter:blur(6px);
    display:flex;align-items:center;justify-content:center;
    opacity:0;
    transform:scale(.4) rotate(-10deg);
    animation:logoIn .9s cubic-bezier(.2,1.4,.4,1) .55s forwards;
    box-shadow:0 20px 60px rgba(0,0,0,.5);
  }
  .splash-logo svg{width:44px;height:44px;}
  @keyframes logoIn{
    0%{opacity:0;transform:scale(.4) rotate(-10deg);}
    60%{opacity:1;transform:scale(1.08) rotate(2deg);}
    100%{opacity:1;transform:scale(1) rotate(0);}
  }
  .splash-title{
    margin-top:22px;font-weight:900;font-size:24px;letter-spacing:.5px;
    color:#fff;text-shadow:0 2px 20px rgba(0,0,0,.5);
    opacity:0;animation:fadeUp .7s ease .95s forwards;
  }
  .splash-sub{
    margin-top:6px;font-size:13px;color:rgba(255,255,255,0.75);
    opacity:0;animation:fadeUp .7s ease 1.1s forwards;
    letter-spacing:.3px;
  }
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  .splash-bar{
    margin-top:32px;width:150px;height:3px;border-radius:3px;
    background:rgba(255,255,255,0.18);overflow:hidden;
    opacity:0;animation:fadeUp .6s ease 1.25s forwards;
  }
  .splash-bar::after{
    content:'';display:block;height:100%;width:40%;border-radius:3px;
    background:#fff;
    animation:barSlide 1.1s ease-in-out infinite;
  }
  @keyframes barSlide{
    0%{transform:translateX(-100%);}
    100%{transform:translateX(350%);}
  }

  /* ---------- APP SHELL ---------- */
  #app{
    max-width:520px;margin:0 auto;padding:22px 18px 100px;
    opacity:0;transform:translateY(14px);
    transition:opacity .6s ease, transform .6s ease;
  }
  #app.show{opacity:1;transform:translateY(0);}

  header.top{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:22px;
    animation:reveal .6s ease .1s both;
  }
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-icon{
    width:38px;height:38px;border-radius:12px;background:var(--accent-grad);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 8px 24px rgba(238,28,37,.35);
  }
  .brand-icon svg{width:20px;height:20px;}
  .brand-name{font-weight:800;font-size:18px;letter-spacing:.2px;}
  .live-pill{
    display:flex;align-items:center;gap:6px;
    font-size:11.5px;color:var(--text-dim);
    background:rgba(255,255,255,0.05);
    border:1px solid var(--card-border);
    padding:6px 11px;border-radius:20px;
  }
  .live-dot{
    width:7px;height:7px;border-radius:50%;background:var(--gold);
    animation:pulseDot 1.8s infinite;
  }
  @keyframes pulseDot{
    0%{box-shadow:0 0 0 0 rgba(255,209,0,.55);}
    70%{box-shadow:0 0 0 8px rgba(255,209,0,0);}
    100%{box-shadow:0 0 0 0 rgba(255,209,0,0);}
  }

  @keyframes reveal{
    from{opacity:0;transform:translateY(16px);}
    to{opacity:1;transform:translateY(0);}
  }

  /* ---------- GLASS CARD ---------- */
  .glass{
    background:var(--card);
    border:1px solid var(--card-border);
    backdrop-filter:blur(22px) saturate(150%);
    -webkit-backdrop-filter:blur(22px) saturate(150%);
    border-radius:var(--radius);
    box-shadow:0 8px 32px rgba(0,0,0,.45);
  }

  .search-card{
    padding:18px;margin-bottom:16px;
    animation:reveal .6s ease .18s both;
    transition:transform .35s cubic-bezier(.2,.9,.3,1.2);
  }

  .field{
    position:relative;display:flex;align-items:center;gap:12px;
    padding:14px 14px;border-radius:var(--radius-sm);
    background:rgba(255,255,255,0.04);
    border:1px solid transparent;
    margin-bottom:10px;
    transition:border-color .25s ease, background .25s ease;
  }
  .field:focus-within{
    border-color:rgba(238,28,37,.6);
    background:rgba(238,28,37,0.07);
  }
  .field .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .dot.start{background:var(--gold);box-shadow:0 0 10px rgba(255,209,0,.8);}
  .dot.end{background:var(--red);box-shadow:0 0 10px rgba(238,28,37,.8);}
  .field input{
    flex:1;background:none;border:none;outline:none;
    color:var(--text);font-family:'Inter',sans-serif;
    font-size:15px;font-weight:500;
  }
  .field input::placeholder{color:var(--text-dim2);}

  .field-connector{position:relative;height:14px;margin:-4px 0 -4px 20px;}
  .field-connector::before{
    content:'';position:absolute;left:0;top:0;bottom:0;
    width:1.5px;background:linear-gradient(var(--gold), var(--red));
    opacity:.6;
  }

  /* ---------- AUTOCOMPLETE ---------- */
  .ac-wrap{position:relative;}
  .ac-list{
    position:absolute;left:0;right:0;top:calc(100% + 6px);z-index:40;
    background:#111;
    border:1px solid var(--card-border);
    border-radius:14px;overflow:hidden;
    box-shadow:0 16px 40px rgba(0,0,0,.55);
    max-height:0;opacity:0;
    transition:max-height .3s ease, opacity .25s ease;
  }
  .ac-list.open{max-height:260px;opacity:1;overflow-y:auto;}
  .ac-item{
    padding:12px 14px;font-size:13.5px;display:flex;align-items:center;gap:10px;
    cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.05);
    transition:background .15s ease;
  }
  .ac-item:last-child{border-bottom:none;}
  .ac-item:hover,.ac-item:active{background:rgba(238,28,37,0.12);}
  .ac-item svg{width:14px;height:14px;color:var(--gold);flex-shrink:0;}
  .ac-item .ac-sub{color:var(--text-dim2);font-size:11px;margin-left:auto;}
  .ac-empty{padding:14px;font-size:12.5px;color:var(--text-dim2);text-align:center;}

  .swap-btn{
    position:absolute;right:10px;top:50%;transform:translateY(-50%);
    width:34px;height:34px;border-radius:50%;
    background:rgba(255,255,255,0.07);
    border:1px solid var(--card-border);
    display:flex;align-items:center;justify-content:center;
    color:var(--text-dim);cursor:pointer;z-index:5;
    transition:transform .4s cubic-bezier(.3,1.5,.4,1), background .2s, color .2s;
  }
  .swap-btn:active{transform:translateY(-50%) rotate(180deg) scale(.9);background:rgba(238,28,37,.25);color:#fff;}

  .quick-row{display:flex;gap:8px;margin:12px 0 4px;flex-wrap:wrap;}
  .chip{
    font-size:12.5px;padding:7px 13px;border-radius:20px;
    background:rgba(255,255,255,0.05);
    border:1px solid var(--card-border);
    color:var(--text-dim);
    display:flex;align-items:center;gap:5px;
    cursor:pointer;transition:all .25s ease;user-select:none;
  }
  .chip:active{transform:scale(.94);}
  .chip.active,.chip:hover{
    border-color:rgba(255,209,0,.6);
    color:var(--text);
    background:rgba(255,209,0,.12);
  }
  .chip svg{width:13px;height:13px;}

  .search-btn{
    width:100%;margin-top:14px;padding:16px;border:none;border-radius:var(--radius-sm);
    background:var(--accent-grad);
    color:#fff;font-weight:700;font-size:15.5px;
    display:flex;align-items:center;justify-content:center;gap:10px;
    cursor:pointer;position:relative;overflow:hidden;
    box-shadow:0 10px 30px rgba(238,28,37,.4);
    transition:transform .18s ease, box-shadow .18s ease;
  }
  .search-btn:active{transform:scale(.97);box-shadow:0 6px 18px rgba(238,28,37,.35);}
  .search-btn .ripple{
    position:absolute;border-radius:50%;
    background:rgba(255,255,255,.5);
    transform:scale(0);animation:ripple .6s ease-out;pointer-events:none;
  }
  @keyframes ripple{to{transform:scale(3);opacity:0;}}
  .search-btn svg{width:17px;height:17px;transition:transform .3s ease;}
  .search-btn.loading svg{animation:spin .9s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .section-title{
    font-size:13px;font-weight:700;color:var(--text-dim);
    text-transform:uppercase;letter-spacing:.8px;
    margin:26px 0 12px 4px;
    display:flex;align-items:center;justify-content:space-between;
  }
  .section-title span.count{
    background:rgba(255,209,0,.15);color:var(--gold);
    padding:2px 9px;border-radius:12px;font-size:11px;
  }

  .recent-item{
    display:flex;align-items:center;gap:12px;
    padding:12px 14px;border-radius:14px;
    background:rgba(255,255,255,0.035);
    margin-bottom:8px;cursor:pointer;
    transition:background .2s ease, transform .2s ease;
  }
  .recent-item:active{transform:scale(.98);}
  .recent-item:hover{background:rgba(255,255,255,0.06);}
  .recent-item svg{width:15px;height:15px;color:var(--gold);flex-shrink:0;}
  .recent-item .rtext{font-size:13.5px;flex:1;}
  .recent-item .rtext b{font-weight:600;}
  .recent-item .rtime{font-size:11px;color:var(--text-dim2);}

  #loadingBox{display:none;margin-top:22px;text-align:center;padding:40px 0;}
  #loadingBox.show{display:block;animation:reveal .4s ease both;}
  .loader-ring{
    width:52px;height:52px;margin:0 auto 16px;
    border-radius:50%;
    border:3px solid rgba(255,255,255,0.08);
    border-top-color:var(--red);
    border-right-color:var(--gold);
    animation:spin .85s linear infinite;
  }
  .loading-text{font-size:13.5px;color:var(--text-dim);}
  .loading-text .lt-dots::after{content:'';animation:dots 1.4s steps(4,end) infinite;}
  @keyframes dots{0%,20%{content:'';}40%{content:'.';}60%{content:'..';}80%,100%{content:'...';}}

  .error-box{
    margin-top:18px;padding:18px;text-align:center;color:var(--text-dim);
    animation:reveal .4s ease both;font-size:13px;
  }
  .error-box b{color:var(--red);display:block;margin-bottom:6px;font-size:14px;}

  #results{margin-top:6px;}
  .route-card{
    padding:18px;margin-bottom:14px;
    opacity:0;transform:translateY(18px) scale(.98);
    animation:cardIn .55s cubic-bezier(.2,.8,.3,1) forwards;
    cursor:pointer;
    transition:transform .25s ease, border-color .25s ease;
  }
  .route-card:active{transform:scale(.98) !important;}
  .route-card:hover{border-color:rgba(255,209,0,.4);}
  @keyframes cardIn{to{opacity:1;transform:translateY(0) scale(1);}}
  .rc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .rc-time{display:flex;align-items:baseline;gap:8px;}
  .rc-time .t1{font-size:22px;font-weight:800;}
  .rc-time .arrow{color:var(--text-dim2);font-size:14px;}
  .rc-time .t2{font-size:22px;font-weight:800;color:var(--text-dim);}
  .rc-badge{font-size:11px;font-weight:700;padding:5px 11px;border-radius:20px;}
  .rc-badge.fast{background:rgba(255,209,0,.18);color:var(--gold);}
  .rc-badge.norm{background:rgba(255,255,255,.06);color:var(--text-dim);}
  .rc-meta{display:flex;gap:16px;margin-bottom:14px;}
  .rc-meta .m{font-size:12.5px;color:var(--text-dim);display:flex;align-items:center;gap:5px;}
  .rc-meta svg{width:13px;height:13px;}

  .rc-line{display:flex;align-items:center;gap:6px;overflow-x:auto;padding:4px 0;scrollbar-width:none;}
  .rc-line::-webkit-scrollbar{display:none;}
  .seg{display:flex;align-items:center;gap:6px;flex-shrink:0;}
  .seg-badge{
    font-size:11px;font-weight:800;padding:5px 9px;border-radius:8px;
    white-space:nowrap;
  }
  .seg-walk{font-size:11px;color:var(--text-dim2);display:flex;align-items:center;gap:3px;}
  .seg-walk svg{width:12px;height:12px;}
  .seg-arrow{color:var(--text-dim2);font-size:12px;}

  .rc-expand{max-height:0;overflow:hidden;transition:max-height .4s ease, margin-top .4s ease;}
  .route-card.open .rc-expand{max-height:500px;margin-top:14px;}
  .stop-line{border-top:1px solid var(--card-border);padding-top:12px;}
  .stop-row{
    display:flex;align-items:center;gap:10px;font-size:12.5px;color:var(--text-dim);
    padding:6px 0;position:relative;
  }
  .stop-row::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--text-dim2);flex-shrink:0;}
  .stop-row.origin::before,.stop-row.dest::before{background:var(--gold);}
  .stop-row b{color:var(--text);font-weight:600;}

  .empty-state{text-align:center;padding:50px 20px;color:var(--text-dim2);animation:reveal .5s ease both;}
  .empty-state svg{width:52px;height:52px;margin-bottom:14px;opacity:.4;}
  .empty-state p{font-size:13.5px;}

  .legend{
    display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;
  }
  .legend-item{
    display:flex;align-items:center;gap:6px;font-size:10.5px;color:var(--text-dim2);
    background:rgba(255,255,255,0.03);padding:4px 9px;border-radius:10px;
  }
  .legend-dot{width:8px;height:8px;border-radius:3px;}

  ::-webkit-scrollbar{width:0;height:0;}
  @media (min-width:600px){#app{padding-top:36px;}}
</style>
</head>
<body>

<div id="splash">
  <div class="flag-stripes">
    <div class="stripe s1"></div>
    <div class="stripe s2"></div>
    <div class="stripe s3"></div>
  </div>
  <div class="splash-content">
    <div class="splash-logo">
      <svg viewBox="0 0 24 24" fill="none"><path d="M4 16.5V7.5C4 5 6 4 9 4H15C18 4 20 5 20 7.5V16.5C20 18 19 19 17.5 19H6.5C5 19 4 18 4 16.5Z" stroke="#fff" stroke-width="1.8"/><circle cx="8" cy="16" r="1.3" fill="#fff"/><circle cx="16" cy="16" r="1.3" fill="#fff"/><path d="M4 12H20" stroke="#fff" stroke-width="1.8"/></svg>
    </div>
    <div class="splash-title">Transit</div>
    <div class="splash-sub">Live-Verbindungen für Deutschland</div>
    <div class="splash-bar"></div>
  </div>
</div>

<div id="app">
  <header class="top">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none"><path d="M4 16.5V7.5C4 5 6 4 9 4H15C18 4 20 5 20 7.5V16.5C20 18 19 19 17.5 19H6.5C5 19 4 18 4 16.5Z" stroke="#fff" stroke-width="1.8"/><circle cx="8" cy="16" r="1.3" fill="#fff"/><circle cx="16" cy="16" r="1.3" fill="#fff"/><path d="M4 12H20" stroke="#fff" stroke-width="1.8"/></svg>
      </div>
      <div class="brand-name">Transit</div>
    </div>
    <div class="live-pill"><span class="live-dot"></span><span id="clockLabel">Live</span></div>
  </header>

  <div class="search-card glass">
    <div class="field ac-wrap">
      <span class="dot start"></span>
      <input id="startInput" type="text" placeholder="Start — z. B. Berlin Hauptbahnhof" autocomplete="off">
      <div class="ac-list" id="startList"></div>
    </div>
    <div class="field-connector"></div>
    <div class="field ac-wrap" style="position:relative;">
      <span class="dot end"></span>
      <input id="endInput" type="text" placeholder="Ziel — z. B. München Hauptbahnhof" autocomplete="off">
      <div class="swap-btn" id="swapBtn">
        <svg viewBox="0 0 24 24" fill="none" width="15" height="15"><path d="M7 7H17L14 4M17 17H7L10 20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="ac-list" id="endList"></div>
    </div>

    <div class="quick-row" id="favChips">
      <div class="chip" data-fav="Berlin Hauptbahnhof"><svg viewBox="0 0 24 24" fill="none"><path d="M3 11L12 3L21 11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 10V20H19V10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>Berlin Hbf</div>
      <div class="chip" data-fav="Hamburg Hauptbahnhof"><svg viewBox="0 0 24 24" fill="none"><path d="M12 3L2 8L12 13L22 8L12 3Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M6 10V16C6 16 8 18 12 18C16 18 18 16 18 16V10" stroke="currentColor" stroke-width="2"/></svg>Hamburg Hbf</div>
      <div class="chip" data-fav="München Hauptbahnhof"><svg viewBox="0 0 24 24" fill="none"><rect x="3" y="7" width="18" height="13" rx="2" stroke="currentColor" stroke-width="2"/><path d="M8 7V5C8 3.9 8.9 3 10 3H14C15.1 3 16 3.9 16 5V7" stroke="currentColor" stroke-width="2"/></svg>München Hbf</div>
    </div>

    <button class="search-btn" id="searchBtn">
      <svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="#fff" stroke-width="2.2"/><path d="M21 21L16.5 16.5" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/></svg>
      <span id="searchBtnText">Route suchen</span>
    </button>
  </div>

  <div id="dynamicSections"></div>

  <div id="loadingBox">
    <div class="loader-ring"></div>
    <div class="loading-text">Live-Verbindungen werden geladen<span class="lt-dots"></span></div>
  </div>

  <div id="results"></div>
</div>

<script>
(function(){

const API = 'https://v6.db.transport.rest';

// ---------- Splash ----------
window.addEventListener('load', ()=>{
  setTimeout(()=>{
    document.getElementById('splash').classList.add('hide');
    document.getElementById('app').classList.add('show');
  }, 1750);
});

// ---------- Clock ----------
function updateClock(){
  const d = new Date();
  document.getElementById('clockLabel').textContent =
    'Live · ' + d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
}
updateClock();
setInterval(updateClock, 30000);

// ---------- In-memory state (kein localStorage in dieser Umgebung) ----------
const state = { recent: [] }; // {startName, endName, startId, endId, time}

const startInput = document.getElementById('startInput');
const endInput = document.getElementById('endInput');
const startList = document.getElementById('startList');
const endList = document.getElementById('endList');
const swapBtn = document.getElementById('swapBtn');
const searchBtn = document.getElementById('searchBtn');
const searchBtnText = document.getElementById('searchBtnText');
const loadingBox = document.getElementById('loadingBox');
const resultsBox = document.getElementById('results');
const dynamicSections = document.getElementById('dynamicSections');

let selected = { start: null, end: null }; // {id, name}

// ---------- Autocomplete (echte DB-Haltestellen) ----------
function stationIcon(){
  return '<svg viewBox="0 0 24 24" fill="none"><path d="M4 16.5V7.5C4 5 6 4 9 4H15C18 4 20 5 20 7.5V16.5C20 18 19 19 17.5 19H6.5C5 19 4 18 4 16.5Z" stroke="currentColor" stroke-width="1.8"/><path d="M4 12H20" stroke="currentColor" stroke-width="1.8"/></svg>';
}

let debounceTimers = {};
function setupAutocomplete(input, listEl, key){
  input.addEventListener('input', ()=>{
    selected[key] = null;
    const q = input.value.trim();
    clearTimeout(debounceTimers[key]);
    if(q.length < 2){ closeList(listEl); return; }
    debounceTimers[key] = setTimeout(()=> fetchSuggestions(q, listEl, input, key), 320);
  });
  input.addEventListener('focus', ()=>{
    if(input.value.trim().length >= 2 && listEl.children.length) listEl.classList.add('open');
  });
  document.addEventListener('click', (e)=>{
    if(!input.parentElement.contains(e.target)) closeList(listEl);
  });
}
function closeList(listEl){ listEl.classList.remove('open'); }

async function fetchSuggestions(query, listEl, input, key){
  try{
    const res = await fetch(`${API}/locations?query=${encodeURIComponent(query)}&results=6&stops=true&addresses=false&poi=false`);
    if(!res.ok) throw new Error('bad response');
    const data = await res.json();
    listEl.innerHTML = '';
    if(!data || !data.length){
      listEl.innerHTML = '<div class="ac-empty">Keine Haltestelle gefunden</div>';
      listEl.classList.add('open');
      return;
    }
    data.forEach(loc=>{
      const item = document.createElement('div');
      item.className = 'ac-item';
      const region = loc.address || (loc.location ? '' : '');
      item.innerHTML = `${stationIcon()}<span>${loc.name}</span>`;
      item.addEventListener('click', ()=>{
        input.value = loc.name;
        selected[key] = { id: loc.id, name: loc.name };
        closeList(listEl);
      });
      listEl.appendChild(item);
    });
    listEl.classList.add('open');
  }catch(err){
    listEl.innerHTML = '<div class="ac-empty">Verbindung zur DB-API fehlgeschlagen</div>';
    listEl.classList.add('open');
  }
}
setupAutocomplete(startInput, startList, 'start');
setupAutocomplete(endInput, endList, 'end');

async function resolveLocation(text){
  const res = await fetch(`${API}/locations?query=${encodeURIComponent(text)}&results=1&stops=true&addresses=false&poi=false`);
  if(!res.ok) throw new Error('resolve failed');
  const data = await res.json();
  if(!data || !data.length) return null;
  return { id: data[0].id, name: data[0].name };
}

// ---------- Favorite chips ----------
document.querySelectorAll('.chip[data-fav]').forEach(chip=>{
  chip.addEventListener('click', ()=>{
    endInput.value = chip.dataset.fav;
    selected.end = null;
    pulse(chip);
  });
});
function pulse(el){
  el.style.transform = 'scale(0.9)';
  setTimeout(()=>{ el.style.transform=''; }, 180);
}

// ---------- Swap ----------
swapBtn.addEventListener('click', ()=>{
  const tv = startInput.value, ts = selected.start;
  startInput.value = endInput.value; selected.start = selected.end;
  endInput.value = tv; selected.end = ts;
});

// ---------- Ripple + Suche ----------
searchBtn.addEventListener('click', function(e){
  const rect = this.getBoundingClientRect();
  const ripple = document.createElement('span');
  ripple.className = 'ripple';
  const size = Math.max(rect.width, rect.height);
  ripple.style.width = ripple.style.height = size+'px';
  ripple.style.left = (e.clientX - rect.left - size/2)+'px';
  ripple.style.top = (e.clientY - rect.top - size/2)+'px';
  this.appendChild(ripple);
  setTimeout(()=>ripple.remove(), 650);
  handleSearch();
});

// ---------- Linien-Style nach echtem DB-Produkttyp ----------
function lineStyle(product){
  const map = {
    nationalExpress:{c:'var(--line-ice)', t:'#111', b:'2px solid #111'},
    national:       {c:'var(--line-ic)',  t:'#fff'},
    regionalExpress:{c:'var(--line-re)',  t:'#fff'},
    regional:       {c:'var(--line-rb)',  t:'#111'},
    suburban:       {c:'var(--line-sbahn)', t:'#fff'},
    subway:         {c:'var(--line-ubahn)', t:'#fff'},
    tram:           {c:'var(--line-tram)', t:'#111'},
    bus:            {c:'var(--line-bus)', t:'#fff'},
    ferry:          {c:'var(--line-ferry)', t:'#fff'}
  };
  return map[product] || {c:'#555', t:'#fff'};
}
function productLabel(product){
  const map = {
    nationalExpress:'ICE', national:'IC/EC', regionalExpress:'RE',
    regional:'RB', suburban:'S-Bahn', subway:'U-Bahn', tram:'Tram', bus:'Bus', ferry:'Fähre'
  };
  return map[product] || product || '?';
}

function svgIcon(name){
  const icons = {
    clock:'<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/><path d="M12 7V12L15 14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>',
    swap:'<svg viewBox="0 0 24 24" fill="none"><path d="M7 16V4M7 4L3 8M7 4L11 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M17 8V20M17 20L21 16M17 20L13 16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>',
    walk:'<svg viewBox="0 0 24 24" fill="none"><circle cx="13" cy="4" r="1.6" fill="currentColor"/><path d="M11 8L8 10L7 15M11 8L14 9L15 13L18 15M14 9L12 14L14 18" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>',
    history:'<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/><path d="M12 7V12L15 14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>'
  };
  return icons[name] || '';
}

function fmtTime(iso){
  const d = new Date(iso);
  return d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
}

// ---------- Route-Karte aus echten Journey-Daten rendern ----------
function renderRouteCard(journey, index){
  const legs = journey.legs;
  const dep = legs[0].departure;
  const arr = legs[legs.length-1].arrival;
  const durationMin = Math.round((new Date(arr) - new Date(dep)) / 60000);
  const transitLegs = legs.filter(l=>!l.walking);
  const transfers = Math.max(0, transitLegs.length - 1);

  const div = document.createElement('div');
  div.className = 'route-card glass';
  div.style.animationDelay = (index*0.09)+'s';

  const segHtml = legs.map((leg,i)=>{
    let html = '';
    if(leg.walking){
      const wmin = Math.max(1, Math.round((new Date(leg.arrival)-new Date(leg.departure))/60000));
      html += `<div class="seg-walk">${svgIcon('walk')} ${wmin} min</div>`;
    } else {
      const st = lineStyle(leg.line ? leg.line.product : '');
      const name = leg.line ? (leg.line.name || productLabel(leg.line.product)) : '?';
      html += `<div class="seg"><span class="seg-badge" style="background:${st.c};color:${st.t};${st.b?('border:'+st.b+';'):''}">${name}</span></div>`;
    }
    if(i < legs.length-1) html += '<span class="seg-arrow">›</span>';
    return html;
  }).join('');

  const stopsHtml = legs.map((leg,i)=>{
    const rows = [];
    const label = leg.walking ? 'Fußweg' : (leg.line ? (leg.line.name || productLabel(leg.line.product)) : '');
    rows.push(`<div class="stop-row ${i===0?'origin':''}"><b>${leg.origin.name}</b> · ${leg.walking?'zu Fuß':'Abfahrt mit '+label} · ${fmtTime(leg.departure)}</div>`);
    if(i === legs.length-1){
      rows.push(`<div class="stop-row dest"><b>${leg.destination.name}</b> · Ankunft · ${fmtTime(leg.arrival)}</div>`);
    } else {
      rows.push(`<div class="stop-row">${leg.destination.name} · Umstieg · ${fmtTime(leg.arrival)}</div>`);
    }
    return rows.join('');
  }).join('');

  div.innerHTML = `
    <div class="rc-top">
      <div class="rc-time">
        <span class="t1">${fmtTime(dep)}</span>
        <span class="arrow">→</span>
        <span class="t2">${fmtTime(arr)}</span>
      </div>
      <span class="rc-badge ${index===0?'fast':'norm'}">${index===0?'Schnellste':durationMin+' Min'}</span>
    </div>
    <div class="rc-meta">
      <div class="m">${svgIcon('clock')} ${durationMin} Min</div>
      <div class="m">${svgIcon('swap')} ${transfers} Umstieg${transfers===1?'':'e'}</div>
    </div>
    <div class="rc-line">${segHtml}</div>
    <div class="rc-expand"><div class="stop-line">${stopsHtml}</div></div>
  `;

  div.addEventListener('click', ()=> div.classList.toggle('open'));
  return div;
}

function shakeInvalid(el){
  el.parentElement.style.borderColor = 'rgba(238,28,37,.85)';
  setTimeout(()=>{ el.parentElement.style.borderColor=''; }, 700);
}

async function handleSearch(){
  const startText = startInput.value.trim();
  const endText = endInput.value.trim();

  if(!startText || !endText){
    if(!startText) shakeInvalid(startInput);
    if(!endText) shakeInvalid(endInput);
    return;
  }

  resultsBox.innerHTML = '';
  loadingBox.classList.add('show');
  searchBtn.classList.add('loading');
  searchBtnText.textContent = 'Suche läuft';

  try{
    let fromLoc = selected.start;
    let toLoc = selected.end;
    if(!fromLoc || fromLoc.name !== startText) fromLoc = await resolveLocation(startText);
    if(!toLoc || toLoc.name !== endText) toLoc = await resolveLocation(endText);

    if(!fromLoc || !toLoc){
      loadingBox.classList.remove('show');
      searchBtn.classList.remove('loading');
      searchBtnText.textContent = 'Route suchen';
      resultsBox.innerHTML = `<div class="error-box glass"><b>Haltestelle nicht gefunden</b>Bitte Start oder Ziel aus der Vorschlagsliste auswählen.</div>`;
      return;
    }

    const url = `${API}/journeys?from=${encodeURIComponent(fromLoc.id)}&to=${encodeURIComponent(toLoc.id)}&results=5&language=de&stopovers=false`;
    const res = await fetch(url);
    if(!res.ok) throw new Error('journeys request failed: '+res.status);
    const data = await res.json();

    loadingBox.classList.remove('show');
    searchBtn.classList.remove('loading');
    searchBtnText.textContent = 'Route suchen';

    if(!data.journeys || !data.journeys.length){
      resultsBox.innerHTML = `<div class="error-box glass"><b>Keine Verbindung gefunden</b>Versuch es mit anderen Haltestellen.</div>`;
      return;
    }

    state.recent.unshift({
      startName: fromLoc.name, endName: toLoc.name,
      startId: fromLoc.id, endId: toLoc.id,
      time: new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})
    });
    state.recent = state.recent.slice(0,5);

    renderResultsHeader(data.journeys.length, fromLoc.name, toLoc.name);
    data.journeys.forEach((j,i)=> resultsBox.appendChild(renderRouteCard(j, i)));
    renderLegend();
    renderDynamicSections();

    resultsBox.scrollIntoView({behavior:'smooth', block:'start'});
  }catch(err){
    loadingBox.classList.remove('show');
    searchBtn.classList.remove('loading');
    searchBtnText.textContent = 'Route suchen';
    resultsBox.innerHTML = `<div class="error-box glass"><b>Live-Daten aktuell nicht erreichbar</b>Die DB-API antwortet nicht. Bitte kurz erneut versuchen.</div>`;
  }
}

function renderResultsHeader(count, start, end){
  const h = document.createElement('div');
  h.className = 'section-title';
  h.style.animation = 'reveal .5s ease both';
  h.innerHTML = `<span>${start} → ${end}</span><span class="count">${count} Verbindungen</span>`;
  resultsBox.appendChild(h);
}

function renderLegend(){
  const l = document.createElement('div');
  l.className = 'legend';
  const items = [
    ['ICE', 'var(--line-ice)'], ['IC/EC','var(--line-ic)'], ['RE','var(--line-re)'],
    ['RB','var(--line-rb)'], ['S-Bahn','var(--line-sbahn)'], ['U-Bahn','var(--line-ubahn)'],
    ['Tram','var(--line-tram)'], ['Bus','var(--line-bus)']
  ];
  l.innerHTML = items.map(([label,color])=>
    `<div class="legend-item"><span class="legend-dot" style="background:${color}"></span>${label}</div>`
  ).join('');
  resultsBox.appendChild(l);
}

function renderDynamicSections(){
  dynamicSections.innerHTML = '';
  if(state.recent.length){
    const title = document.createElement('div');
    title.className = 'section-title';
    title.textContent = 'Letzte Suchen';
    dynamicSections.appendChild(title);

    const wrap = document.createElement('div');
    state.recent.forEach(r=>{
      const item = document.createElement('div');
      item.className = 'recent-item glass';
      item.innerHTML = `
        ${svgIcon('history')}
        <div class="rtext"><b>${r.startName}</b> → ${r.endName}</div>
        <div class="rtime">${r.time}</div>
      `;
      item.addEventListener('click', ()=>{
        startInput.value = r.startName; selected.start = { id:r.startId, name:r.startName };
        endInput.value = r.endName; selected.end = { id:r.endId, name:r.endName };
        handleSearch();
      });
      wrap.appendChild(item);
    });
    dynamicSections.appendChild(wrap);
  }
}

[startInput, endInput].forEach(inp=>{
  inp.addEventListener('keydown', e=>{ if(e.key === 'Enter') searchBtn.click(); });
});

})();
</script>
